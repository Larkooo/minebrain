# MineBrain Training Server
# Optimized for headless RL training

# Core
server-port=25565
online-mode=false
gamemode=survival
difficulty=normal
spawn-protection=0
max-players=16
view-distance=8
simulation-distance=6

# Performance - reduce overhead
generate-structures=true
allow-nether=true
spawn-monsters=true
spawn-animals=true
spawn-npcs=true
pvp=false

# Training-friendly settings
allow-flight=true
enable-command-block=true
force-gamemode=false
level-type=minecraft\:normal
level-seed=minebrain42
motd=MineBrain Training Server

# Disable unnecessary features
enable-query=false
enable-rcon=false
white-list=false
enforce-whitelist=false
hide-online-players=false
broadcast-console-to-ops=false
broadcast-rcon-to-ops=false
enable-status=false
log-ips=false
